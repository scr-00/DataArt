<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timeline App</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">📅 Timeline App</div>
    <button id="theme-toggle">🌙 Toggle Theme</button>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- FILTERS (EMPTY FOR NOW) -->
    <nav id="filters">
      <!-- Future filters -->
    </nav>

    <!-- TIMELINE -->
    <section id="timeline">
      <!-- Event markers will come here -->
    </section>

  </main>

  <!-- MODAL -->
  <div id="modal" role="dialog" aria-modal="true" class="hidden">
    <div class="modal-content">
      <button id="close-modal">❌</button>
      <article id="modal-body"></article>
    </div>
  </div>
  <div id="root"></div>
  <script src="script.js"></script>
</body>
</html>
